services:
  app:
    build:
      context: .
      dockerfile: backend_compose_dockerfile
    environment:
      - RUNNING_IN_DOCKER=true
      - EXTERNAL_HOST=${PORTAL_BACKEND_HOST_IP:-localhost}
      - EXTERNAL_PORT=${MINIO_PORT:-8004}
      - EXTERNAL_SCHEME=${EXTERNAL_SCHEME:-}
      - USE_SSL=${USE_SSL:-false}
      # MinIO SDK credentials — passed from clinical-dashboard/.env
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SERVER_SECRET_KEY:-minioadmin}
      # Nginx route prefix — used to construct externally-accessible proxy URLs
      # Must match the location block in nginx: /plugin/<expose_name>
      - PLUGIN_ROUTE_PREFIX=${PLUGIN_ROUTE_PREFIX:-/plugin/medical-image-annotator}
    restart: unless-stopped
    volumes:
      - digitaltwins_portal_datasets:/annotator_gui_backend/data
      - annotator_outputs:/annotator_gui_backend/outputs
    networks:
      - digitaltwins

volumes:
  digitaltwins_portal_datasets:
    external: true
  annotator_outputs:
    driver: local
networks:
  digitaltwins:
    external: true
    name: digitaltwins
