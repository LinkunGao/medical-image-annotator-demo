services:
  app:
    build:
      context: .
      dockerfile: backend_compose_dockerfile
    ports:
      - "8002:8082"
    environment:
      - RUNNING_IN_DOCKER=true
      - EXTERNAL_HOST=${EXTERNAL_HOST:-localhost}
      - EXTERNAL_PORT=${EXTERNAL_PORT:-8002}
      - EXTERNAL_SCHEME=${EXTERNAL_SCHEME:-}
    restart: unless-stopped
    volumes:
      - digitaltwins_portal_datasets:/annotator_gui_backend/data
    networks:
      - digitaltwins

volumes:
  digitaltwins_portal_datasets:
    external: true

networks:
  digitaltwins:
    external: true
    name: digitaltwins