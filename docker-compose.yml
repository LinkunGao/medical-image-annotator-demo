services:

  # ─── Frontend (Nginx serving the built Vue SPA) ───────────────────────────
  frontend:
    build:
      context: ./annotator-frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - annotator-net
    restart: unless-stopped

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./annotator-backend
      dockerfile: backend_compose_dockerfile
    ports:
      - "${BACKEND_EXTERNAL_PORT:-8002}:8082"
    environment:
      - RUNNING_IN_DOCKER=true
      - EXTERNAL_HOST=${PORTAL_BACKEND_HOST_IP:-localhost}
      - EXTERNAL_PORT=${MINIO_PORT:-9000}
      - EXTERNAL_SCHEME=${EXTERNAL_SCHEME:-}
      - USE_SSL=${USE_SSL:-false}
      # MinIO SDK credentials
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SERVER_SECRET_KEY:-minioadmin}
      # Nginx route prefix
      - PLUGIN_ROUTE_PREFIX=${PLUGIN_ROUTE_PREFIX:-/plugin/medical-image-annotator}
    volumes:
      - ./annotator-backend/outputs:/annotator_gui_backend/outputs
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - annotator-net
    restart: unless-stopped

  # ─── MinIO Object Storage ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SERVER_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - annotator-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── MinIO Init (one-shot: create buckets) ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ACCESS_KEY=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SERVER_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/measurements;
        mc mb --ignore-existing local/models;
        mc mb --ignore-existing local/workflows;
        mc mb --ignore-existing local/processes;
        mc anonymous set download local/tools || true;
        echo 'MinIO buckets initialised.';
      "
    networks:
      - annotator-net
    restart: "no"

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  minio_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  annotator-net:
    driver: bridge
